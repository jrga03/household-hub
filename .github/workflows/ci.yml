name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npx vitest run # `run` = single pass (bare `vitest` is watch mode)

      # Type checking is covered by `npm run build` (tsc -b) below; a separate
      # `tsc --noEmit` was redundant (review INFRA-06).
      - name: Build application
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://dummy.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJkdW1teSIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNjQwOTk1MjAwLCJleHAiOjE5NTY1NzEyMDB9.dummy' }}

      # Enforce the initial-bundle budget (review UI-03/Theme 7): fails the
      # build if the eagerly loaded JS graph regresses past the ceiling.
      - name: Check bundle size budget
        run: npm run size

  e2e:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'
    timeout-minutes: 30

    steps:
      - name: Check for E2E credentials
        id: check-creds
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
            echo "Skipping E2E tests: missing one or more Supabase secrets"
          else
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Checkout code
        if: steps.check-creds.outputs.has_credentials == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.check-creds.outputs.has_credentials == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        if: steps.check-creds.outputs.has_credentials == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.check-creds.outputs.has_credentials == 'true'
        run: npx playwright install --with-deps

      - name: Build application
        if: steps.check-creds.outputs.has_credentials == 'true'
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Run E2E tests
        if: steps.check-creds.outputs.has_credentials == 'true'
        run: npm run test:e2e
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload test results
        if: failure() && steps.check-creds.outputs.has_credentials == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
