name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      - name: Build application
        run: npm run build
        env:
          # Use dummy values for CI build (real values in Cloudflare Pages)
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://dummy.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJkdW1teSIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNjQwOTk1MjAwLCJleHAiOjE5NTY1NzEyMDB9.dummy' }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN || '' }}

      - name: Check build output size
        run: |
          echo "📦 Build output size:"
          du -sh dist/
          echo ""
          echo "📄 Asset sizes:"
          ls -lh dist/assets/*.js 2>/dev/null || echo "No JS files found"
          echo ""
          echo "🎨 CSS sizes:"
          ls -lh dist/assets/*.css 2>/dev/null || echo "No CSS files found"

      - name: Check for E2E credentials
        id: check-e2e-creds
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
            echo "Skipping E2E tests: no Supabase credentials configured"
          else
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}

      - name: Run E2E tests
        if: steps.check-e2e-creds.outputs.has_credentials == 'true' && hashFiles('tests/e2e/**') != ''
        run: |
          echo "Installing Playwright browsers..."
          npx playwright install --with-deps
          echo "Running E2E tests..."
          npm run test:e2e

      - name: Upload test results
        if: failure() && steps.check-e2e-creds.outputs.has_credentials == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://dummy.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJkdW1teSIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNjQwOTk1MjAwLCJleHAiOjE5NTY1NzEyMDB9.dummy' }}

      - name: Start preview server
        run: |
          npm run preview &
          echo "Waiting for server to start..."
          sleep 5
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:4173 || exit 1

      - name: Run Lighthouse CI
        run: npm run lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30

  deploy-info:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deployment information
        run: |
          echo "🚀 Deployment Information"
          echo "========================="
          echo ""
          echo "✅ All tests passed!"
          echo ""
          echo "📝 Next steps:"
          echo "1. Cloudflare Pages will automatically deploy this commit"
          echo "2. Check the Cloudflare Pages dashboard for deployment status"
          echo "3. Visit the preview URL once deployment completes"
          echo "4. Monitor Sentry for any production errors"
          echo ""
          echo "🔗 Links:"
          echo "- Cloudflare Pages: https://dash.cloudflare.com/pages"
          echo "- Sentry: https://sentry.io/"
          echo ""
          echo "📊 Performance:"
          echo "- Lighthouse CI results available in artifacts"
          echo "- Review scores to ensure targets met (≥90/95/90/90)"
