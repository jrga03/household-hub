<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Offline - Household Hub</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        padding: 2rem;
      }

      .container {
        text-align: center;
        max-width: 500px;
      }

      .icon {
        font-size: 4rem;
        margin-bottom: 1rem;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
      }

      p {
        font-size: 1.125rem;
        margin-bottom: 2rem;
        opacity: 0.9;
      }

      .button {
        display: inline-block;
        padding: 1rem 2rem;
        background: #fff;
        color: #667eea;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        transition: transform 0.2s;
      }

      .button:hover {
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>You're Offline</h1>
      <p>
        It looks like you've lost your internet connection. Don't worry though - Household Hub works
        offline!
      </p>
      <p>
        Your cached data is still available. Any changes you make will sync automatically when
        you're back online.
      </p>
      <a href="/" class="button">Return to App</a>
    </div>
  </body>
</html>
